<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu | FoodDash</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .payment-label { display: block; font-weight: bold; margin-top: 10px; color: #444; text-align: left; }
    </style>
</head>
<body>
    <nav>
        <h1 onclick="location.href='index.html'" style="cursor:pointer">🍔 FoodDash</h1>
        <div>
            <a href="track.html" style="color:white; margin-right:20px; text-decoration:none; font-weight:bold;">📍 Track Order</a>
            <button class="btn" onclick="localStorage.clear(); location.href='login.html'">Logout</button>
        </div>
    </nav>

    <div class="container">
        <h2 id="welcome-msg">Explore Our Delicious Menu</h2>
        <div id="product-list" class="grid"></div>
    </div>

    <!-- PSEUDO CARD PAYMENT MODAL -->
    <div id="pay-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); width:420px; background:white; padding:35px; box-shadow:0 10px 50px rgba(0,0,0,0.5); border-radius:20px; z-index:2000; text-align:center;">
        <h2 style="color:#1e272e;">💳 Secure Checkout</h2>
        <h3 style="color:#ff3f34; background:#f9f9f9; padding:10px; border-radius:10px;">Amount: $<span id="modal-total"></span></h3>
        
        <div style="text-align: left; margin-top: 20px;">
            <label class="payment-label">Card Number</label>
            <input type="text" id="c-num" placeholder="1234 5678 9876 5432" maxlength="19" style="letter-spacing: 2px; font-weight: bold;">
            
            <label class="payment-label">Cardholder Name</label>
            <input type="text" id="c-name" placeholder="John Smith">
            
            <div style="display:flex; gap:10px;">
                <div style="flex:1">
                    <label class="payment-label">Expiry (MM/YY)</label>
                    <input type="text" id="c-expiry" placeholder="12/26">
                </div>
                <div style="flex:1">
                    <label class="payment-label">CVV Code</label>
                    <input type="password" id="c-cvv" placeholder="123" maxlength="3">
                </div>
            </div>
        </div>

        <button class="btn" style="width:100%; height:50px; margin-top:25px; font-size:1.1rem;" onclick="executePayment()">Confirm Payment & Place Order</button>
        <p style="margin-top:15px; cursor:pointer; color:gray;" onclick="document.getElementById('pay-modal').style.display='none'">Go Back</p>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if(!user) location.href = 'login.html';
        
        document.getElementById('welcome-msg').innerText = `Welcome Back, ${user.name}! Ready to Eat?`;

        let selectedPrice = 0;

        // 1. Fetch products
        fetch('/api/products').then(res => res.json()).then(data => {
            document.getElementById('product-list').innerHTML = data.map(item => `
                <div class="card">
                    <img src="${item.image_url}">
                    <h3>${item.name}</h3>
                    <p style="font-weight:bold; font-size:1.5rem; color:#ff3f34;">$${item.price}</p>
                    <button class="btn" style="width:100%" onclick="showPayModal(${item.price})">Add to Order</button>
                </div>
            `).join('');
        });

        // 2. Open Payment
        function showPayModal(price) {
            selectedPrice = price;
            document.getElementById('modal-total').innerText = price.toFixed(2);
            document.getElementById('pay-modal').style.display = 'block';
        }

        // 3. ROCKSOLID Payment Logic
        async function executePayment() {
            const rawCard = document.getElementById('c-num').value;
            const name = document.getElementById('c-name').value;
            
            // CLEAN CARD (Removes any spaces)
            const cleanCard = rawCard.replace(/\s+/g, '');

            if (!name) return alert("Enter Cardholder Name");
            
            if (cleanCard.length !== 16 || isNaN(cleanCard)) {
                return alert("❌ Invalid Card! Please enter a 16-digit card number.");
            }

            const response = await fetch('/api/order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: user.id,
                    userName: user.name,
                    total: selectedPrice,
                    card: cleanCard
                })
            });

            if (response.ok) {
                alert("🎉 SUCCESS: Order Placed!");
                location.href = 'track.html';
            } else {
                const err = await response.json();
                alert("❌ REJECTED: " + err.error);
            }
        }
    </script>
</body>
</html>
